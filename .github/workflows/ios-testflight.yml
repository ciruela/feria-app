# Compila y sube a TestFlight en cada push a main (cambios de app).
#
# Secrets en GitHub → Settings → Secrets and variables → Actions:
#   SUPABASE_URL
#   SUPABASE_ANON_KEY
#   APP_STORE_CONNECT_ISSUER_ID
#   APP_STORE_CONNECT_KEY_ID
#   APP_STORE_CONNECT_PRIVATE_KEY   (contenido completo del .p8)
#   APP_STORE_CERTIFICATE_KEY       (clave privada RSA 2048 PEM para certificado de distribución)
#
# API Key: App Store Connect → Users and Access → Integrations → App Store Connect API
# El certificado de distribución se crea/descarga solo en el runner (Codemagic CLI).

name: iOS TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'ios/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'assets/**'
      - '.github/workflows/ios-testflight.yml'
  workflow_dispatch:

concurrency:
  group: ios-testflight
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: macos-26
    timeout-minutes: 60

    env:
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      APP_STORE_CERTIFICATE_KEY: ${{ secrets.APP_STORE_CERTIFICATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.6'

      - name: Verify Xcode / iOS SDK
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -E 'iphoneos|iOS'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build number
        run: |
          BUILD=$(( ${{ github.run_number }} + 10 ))
          perl -pi -e "s/^version: .*/version: 1.0.0+${BUILD}/" pubspec.yaml
          echo "Build number: ${BUILD}"
          grep '^version:' pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Install Codemagic CLI
        run: pipx install codemagic-cli-tools

      - name: Fetch signing files
        run: |
          keychain initialize
          app-store-connect fetch-signing-files com.armeria.feria.appFeria \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@env:APP_STORE_CERTIFICATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: Build IPA
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          DART_DEFINES=""
          if [[ -n "$SUPABASE_URL" && -n "$SUPABASE_ANON_KEY" ]]; then
            DART_DEFINES="--dart-define=SUPABASE_URL=${SUPABASE_URL} --dart-define=SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
          fi
          # Usar el export_options.plist generado por Codemagic (firma manual + profile).
          # shellcheck disable=SC2086
          flutter build ipa \
            --export-options-plist="$HOME/export_options.plist" \
            $DART_DEFINES
          ls -la build/ios/ipa/
          test -n "$(ls build/ios/ipa/*.ipa 2>/dev/null)"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: build/ios/ipa/app_feria.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          wait-for-processing: 'false'
